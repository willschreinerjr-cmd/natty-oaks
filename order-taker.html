<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Natty Oaks — Scratchpad</title>
  <!--
    ════════════════════════════════════════════════════════════════
    This app is a temporary digital server notebook for Natty Oaks.
    It is NOT a POS. The goal is speed, searchability, and simple
    order memory during a rush. The server uses this to remember
    what was ordered, then enters it into the real POS.
    ════════════════════════════════════════════════════════════════
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      /* ── Milwaukee Brewers theme ── navy + gold + cream ── */
      --navy:#0a2351;--navy2:#12356b;--navy3:#1d4d9e;
      --gold:#ffc52f;--gold2:#ffd45a;--golddark:#b6922e;
      /* legacy aliases (so existing rules keep working) */
      --green:var(--navy);--green2:var(--navy2);--green3:var(--navy3);
      --bg:#080a10;--bg2:#0e1320;
      --panel:#141a26;--panel2:#1c2436;--panel3:#283149;
      --text:#f3f1e6;--muted:#9aa3b8;--border:#2a3450;--border2:#3f4d72;
      --red:#d94c38;--blue:#3a8fd6;
      --shadow:0 4px 18px rgba(0,0,0,.5);--shadow-gold:0 0 0 1px rgba(255,197,47,.22),0 4px 14px rgba(0,0,0,.45);
      --r:14px;
      --serif:'Cinzel','Playfair Display',Georgia,serif;
      --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    }
    html,body{height:100%}
    body{font-family:var(--sans);
      background:
        radial-gradient(1200px 700px at 80% -10%,rgba(255,197,47,.07),transparent 60%),
        radial-gradient(900px 600px at -10% 110%,rgba(29,77,158,.18),transparent 60%),
        linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
      color:var(--text);height:100dvh;overflow:hidden;
      display:flex;flex-direction:column;font-size:16px;letter-spacing:.01em}
    button,input,textarea{font-family:inherit;color:inherit}

    /* ── HEADER ── */
    header{
      background:
        linear-gradient(180deg,#0d120c 0%,#141a12 100%);
      color:#fff;padding:10px 14px;
      display:flex;align-items:center;gap:10px;z-index:100;
      border-bottom:1px solid rgba(212,179,90,.35);
      box-shadow:0 4px 18px rgba(0,0,0,.6),inset 0 -1px 0 rgba(212,179,90,.08);
      flex-shrink:0;position:relative}
    header::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;
      background:linear-gradient(90deg,transparent,var(--gold) 30%,var(--gold2) 50%,var(--gold) 70%,transparent);
      opacity:.55;pointer-events:none}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .logo-img{width:40px;height:40px;border-radius:50%;
      background:#000;object-fit:cover;flex-shrink:0;
      box-shadow:0 0 0 2px var(--gold),0 2px 8px rgba(0,0,0,.6)}
    .logo-img.fallback{display:none}
    .brand-text{display:flex;flex-direction:column;line-height:1;min-width:0}
    .logo{font-family:var(--serif);font-size:1.15rem;font-weight:800;
      color:var(--gold2);white-space:nowrap;letter-spacing:.08em;
      text-shadow:0 1px 2px rgba(0,0,0,.6)}
    .tagline{font-size:.62rem;color:var(--muted);letter-spacing:.25em;
      text-transform:uppercase;margin-top:3px;font-weight:700}
    .hdr-spacer{flex:1}
    .hdr-fields{display:flex;gap:5px}
    .hdr-inp{background:rgba(0,0,0,.45);border:1px solid rgba(212,179,90,.3);
      color:#fff;border-radius:9px;padding:8px 10px;font-size:.85rem;width:78px;
      text-align:center;font-weight:700;letter-spacing:.04em;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
    .hdr-inp:focus{outline:none;border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(212,179,90,.18),inset 0 1px 0 rgba(255,255,255,.04)}
    .hdr-inp::placeholder{color:rgba(255,255,255,.45);font-weight:500}
    .beg-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;
      background:rgba(0,0,0,.45);padding:7px 12px;border-radius:20px;
      font-size:.74rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
      border:1px solid rgba(212,179,90,.25);color:#d8d4c5;transition:.15s}
    .beg-toggle .dot{width:12px;height:12px;border-radius:50%;background:#3a3a3a;
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.5);transition:.15s}
    .beg-toggle.on{background:linear-gradient(180deg,var(--gold2),var(--gold));
      color:#1a1408;border-color:var(--golddark);
      box-shadow:0 0 0 1px rgba(212,179,90,.3),0 2px 8px rgba(212,179,90,.25)}
    .beg-toggle.on .dot{background:#1b4a1b}
    #viewOrderBtn{background:linear-gradient(180deg,var(--gold2),var(--gold));
      color:#1a1408;border:none;border-radius:11px;
      padding:9px 14px;font-size:.85rem;font-weight:900;cursor:pointer;
      letter-spacing:.04em;
      display:none;align-items:center;gap:7px;white-space:nowrap;
      box-shadow:0 2px 10px rgba(212,179,90,.3),inset 0 1px 0 rgba(255,255,255,.3)}
    .badge{background:var(--red);color:#fff;border-radius:50%;
      width:22px;height:22px;display:inline-flex;align-items:center;
      justify-content:center;font-size:.74rem;font-weight:900;
      box-shadow:0 1px 4px rgba(0,0,0,.4)}

    /* ── SEARCH BAR ── */
    .search-wrap{background:linear-gradient(180deg,var(--panel) 0%,#141a12 100%);
      padding:11px 14px;
      border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90;
      display:flex;gap:10px;align-items:center;flex-shrink:0}
    .search-inp{flex:1;background:var(--panel2);
      border:2px solid var(--border);
      color:var(--text);border-radius:14px;padding:14px 18px;font-size:1.05rem;
      font-weight:600;outline:none;transition:.15s;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
    .search-inp:focus{border-color:var(--gold);background:var(--panel3);
      box-shadow:0 0 0 3px rgba(212,179,90,.15),inset 0 1px 0 rgba(255,255,255,.03)}
    .search-inp::placeholder{color:var(--muted);font-weight:500}
    .search-clear{background:var(--panel3);border:1px solid var(--border2);color:var(--text);
      width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.05rem;
      display:none;flex-shrink:0;font-weight:700}
    .search-clear.vis{display:block}

    /* ── LAYOUT ── */
    .body{display:flex;flex:1;overflow:hidden;min-height:0}

    /* ── MENU PANEL ── */
    .menu{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    .main-tabs{display:flex;background:linear-gradient(180deg,#141a12 0%,var(--panel) 100%);
      gap:4px;padding:8px 10px 0;
      border-bottom:1px solid var(--border)}
    .mt-btn{flex:1;background:transparent;color:var(--muted);
      border:none;border-radius:11px 11px 0 0;padding:13px 4px;font-size:.95rem;
      font-weight:800;cursor:pointer;letter-spacing:.18em;text-transform:uppercase;
      position:relative;transition:.15s}
    .mt-btn:hover{color:#cfc8b3}
    .mt-btn.active{background:var(--bg);color:var(--gold2)}
    .mt-btn.active::after{content:"";position:absolute;left:18%;right:18%;bottom:-1px;
      height:3px;background:linear-gradient(90deg,transparent,var(--gold) 50%,transparent);
      border-radius:2px}
    .cat-bar{background:var(--panel);display:flex;overflow-x:auto;
      gap:6px;padding:9px 10px;scrollbar-width:none;border-bottom:1px solid var(--border)}
    .cat-bar::-webkit-scrollbar{display:none}
    .cat-btn{background:var(--panel2);color:#bdbeae;
      border:1px solid var(--border);border-radius:22px;padding:9px 16px;font-size:.82rem;
      font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;
      letter-spacing:.04em;transition:.15s}
    .cat-btn:hover{border-color:var(--border2);color:#e5e2d4}
    .cat-btn.active{background:linear-gradient(180deg,var(--gold2),var(--gold));
      color:#1a1408;border-color:var(--golddark);font-weight:800;
      box-shadow:0 2px 10px rgba(212,179,90,.25),inset 0 1px 0 rgba(255,255,255,.3)}
    .items-wrap{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
    .items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
    .item-btn{background:linear-gradient(180deg,var(--panel2) 0%,#1b231a 100%);
      border:1px solid var(--border);border-radius:var(--r);
      padding:14px 13px;cursor:pointer;text-align:left;
      display:flex;flex-direction:column;gap:4px;min-height:82px;position:relative;
      transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease;
      box-shadow:0 2px 6px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.03)}
    .item-btn::before{content:"";position:absolute;inset:0;border-radius:var(--r);
      background:linear-gradient(180deg,rgba(212,179,90,.0) 0%,rgba(212,179,90,0) 100%);
      pointer-events:none;transition:.15s}
    .item-btn:hover{border-color:var(--border2)}
    .item-btn:active{transform:scale(.97);border-color:var(--gold);
      background:linear-gradient(180deg,var(--panel3) 0%,#252e22 100%);
      box-shadow:0 0 0 2px rgba(212,179,90,.18),0 2px 8px rgba(0,0,0,.4)}
    .item-btn .iname{font-size:.98rem;font-weight:800;color:var(--text);line-height:1.2;
      padding-right:24px;letter-spacing:.005em}
    .item-btn .idesc{font-size:.74rem;color:var(--muted);line-height:1.35}
    .item-btn .icat{font-size:.62rem;color:var(--gold);font-weight:800;
      text-transform:uppercase;letter-spacing:.12em;margin-top:auto;padding-top:4px;
      opacity:.85}
    .item-btn.custom-item{border-style:dashed;border-color:var(--border2)}
    .star{position:absolute;top:6px;right:6px;background:transparent;border:none;
      cursor:pointer;font-size:1.15rem;color:#444;padding:4px;line-height:1;z-index:2;
      transition:.15s;text-shadow:0 1px 2px rgba(0,0,0,.4)}
    .star.on{color:var(--gold2);text-shadow:0 0 8px rgba(212,179,90,.5)}
    .compact .item-btn{min-height:56px;padding:10px 12px}
    .compact .item-btn .iname{font-size:.88rem}
    .compact .item-btn .idesc,.compact .item-btn .icat{display:none}
    .section-hdr{grid-column:1/-1;font-family:var(--serif);
      font-size:.95rem;color:var(--gold2);
      font-weight:800;text-transform:uppercase;letter-spacing:.2em;
      padding:12px 4px 6px;border-bottom:1px solid var(--border);margin-bottom:4px;
      display:flex;align-items:center;gap:10px}
    .section-hdr::after{content:"";flex:1;height:1px;
      background:linear-gradient(90deg,rgba(212,179,90,.4),transparent)}
    .empty-search{grid-column:1/-1;padding:36px 20px;text-align:center;color:var(--muted);
      font-style:italic}

    /* ── ORDER SIDEBAR ── */
    .order-sidebar{width:340px;background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);
      border-left:1px solid var(--border);
      display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
      box-shadow:inset 1px 0 0 rgba(212,179,90,.08)}
    .ord-head{
      background:linear-gradient(180deg,#0d120c 0%,#141a12 100%);
      color:#fff;padding:13px 16px;
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;
      border-bottom:1px solid rgba(212,179,90,.25);position:relative}
    .ord-head::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.5}
    .ord-head h2{font-family:var(--serif);font-size:1rem;color:var(--gold2);
      font-weight:800;letter-spacing:.18em;text-transform:uppercase}
    .ord-items{flex:1;overflow-y:auto;padding:12px 10px}
    /* ── order item card ── */
    .ord-item{background:var(--panel2);border-radius:14px;padding:14px 14px 10px;
      margin-bottom:10px;display:flex;flex-direction:column;gap:0;
      border:1px solid var(--border);box-shadow:0 3px 10px rgba(0,0,0,.35);
      position:relative}
    .oi-num{position:absolute;top:-1px;left:-1px;background:var(--navy3);
      color:#fff;font-size:.68rem;font-weight:900;letter-spacing:.05em;
      padding:3px 8px 3px 10px;border-radius:14px 0 10px 0;line-height:1}
    .oi-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;
      padding-top:10px}
    .oi-name{font-size:1.05rem;font-weight:900;color:#fff;flex:1;line-height:1.2;
      letter-spacing:.01em}
    .oi-qty-badge{background:var(--gold);color:#000;font-weight:900;font-size:.75rem;
      border-radius:20px;padding:2px 9px;white-space:nowrap;align-self:center;flex-shrink:0}
    .oi-seat{font-size:.72rem;color:var(--gold);font-weight:800;letter-spacing:.08em;
      margin-top:3px}
    /* ── mods ── */
    .oi-mods{display:flex;flex-direction:column;gap:4px;margin-top:9px;
      padding-top:9px;border-top:1px solid var(--border)}
    .oi-mod-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
    .oi-mod-label{font-size:.7rem;color:var(--gold);font-weight:800;
      letter-spacing:.07em;text-transform:uppercase;min-width:60px;flex-shrink:0}
    .oi-mod-val{font-size:.82rem;color:var(--text);font-weight:600;opacity:.9}
    /* NO pills */
    .oi-no-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;align-items:center}
    .oi-no-label{font-size:.7rem;color:#e85a45;font-weight:800;
      letter-spacing:.07em;text-transform:uppercase;min-width:60px;flex-shrink:0}
    .oi-no-pill{background:rgba(232,90,69,.18);border:1.5px solid #e85a45;
      color:#ff7a63;font-size:.8rem;font-weight:800;border-radius:20px;
      padding:2px 10px;display:flex;align-items:center;gap:4px;white-space:nowrap}
    .oi-no-pill::before{content:"✕";font-size:.7rem;font-weight:900}
    /* notes */
    .oi-notes{font-size:.85rem;color:#ffe47a;font-weight:600;
      background:rgba(255,197,47,.1);border:1px solid rgba(255,197,47,.3);
      border-radius:8px;padding:6px 11px;margin-top:8px;
      display:flex;align-items:flex-start;gap:7px;line-height:1.4}
    .oi-notes::before{content:"★";font-size:.85rem;color:var(--gold);flex-shrink:0;margin-top:1px}
    /* controls */
    .oi-ctrl{display:flex;align-items:center;gap:8px;margin-top:10px;
      padding-top:8px;border-top:1px solid var(--border)}
    .oi-price{font-size:.78rem;color:var(--muted);font-weight:600;margin-right:auto}
    .qty-btn{background:linear-gradient(180deg,var(--green2),var(--green));
      color:#fff;border:none;border-radius:7px;
      width:30px;height:30px;cursor:pointer;font-size:1.1rem;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 1px 3px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1)}
    .qty-disp{font-weight:800;font-size:.95rem;min-width:24px;text-align:center}
    .rm-btn{background:none;border:none;color:var(--red);cursor:pointer;
      font-size:1.25rem;margin-left:auto;padding:4px 8px;line-height:1;font-weight:700}
    .ord-foot{padding:12px 16px;border-top:1px solid var(--border);
      background:linear-gradient(180deg,var(--bg2),var(--bg));
      flex-shrink:0;display:flex;flex-direction:column;gap:10px}
    .ord-meta{display:flex;justify-content:space-between;align-items:center;
      font-size:.82rem;color:var(--muted);letter-spacing:.04em}
    .ord-meta .count{color:var(--gold2);font-weight:900;font-size:1rem}
    .ord-meta .total{font-size:.85rem;color:var(--muted);font-weight:600}
    .ord-note-ta{width:100%;background:var(--panel2);border:1px solid var(--border);
      border-radius:9px;padding:9px 11px;font-size:.85rem;resize:none;height:50px;color:var(--text)}
    .ord-note-ta:focus{outline:none;border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(255,197,47,.15)}
    .copy-btn{background:linear-gradient(180deg,#4ba0e0,#2f7fbe);
      color:#fff;border:none;border-radius:11px;
      padding:14px;font-size:.95rem;font-weight:800;cursor:pointer;letter-spacing:.06em;
      box-shadow:0 3px 10px rgba(58,143,214,.3),inset 0 1px 0 rgba(255,255,255,.18)}
    .copy-btn:active{opacity:.85;transform:translateY(1px)}
    .copy-btn.copied{background:linear-gradient(180deg,#3e8a3e,var(--green))}
    .clear-big{background:linear-gradient(180deg,#e8604d,#c43a26);
      color:#fff;border:none;border-radius:11px;
      padding:14px;font-size:1rem;font-weight:900;cursor:pointer;letter-spacing:.1em;
      text-transform:uppercase;
      box-shadow:0 3px 10px rgba(217,76,56,.3),inset 0 1px 0 rgba(255,255,255,.18)}
    .clear-big:active{opacity:.85;transform:translateY(1px)}
    .empty-ord{display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100%;color:var(--muted);font-size:.92rem;text-align:center;padding:24px;gap:10px;
      font-style:italic}
    .empty-ord-ico{font-size:3rem;opacity:.4}

    /* ── MODAL ── */
    .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
      display:flex;align-items:flex-end;justify-content:center;
      backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
    .modal-ov.hidden{display:none}
    .modal{background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);
      border-radius:20px 20px 0 0;width:100%;
      max-width:600px;max-height:92dvh;display:flex;flex-direction:column;
      box-shadow:0 -6px 40px rgba(0,0,0,.6),0 -1px 0 rgba(212,179,90,.3) inset}
    .modal-handle{width:44px;height:4px;background:var(--gold);opacity:.4;
      border-radius:2px;margin:10px auto 0}
    .modal-hdr{padding:14px 20px 12px;border-bottom:1px solid var(--border);
      position:relative}
    .modal-hdr::after{content:"";position:absolute;left:20px;right:20px;bottom:-1px;height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
    .modal-title{font-family:var(--serif);font-size:1.25rem;font-weight:800;
      color:var(--gold2);letter-spacing:.04em}
    .modal-sub{font-size:.78rem;color:var(--muted);font-weight:600;margin-top:3px;
      letter-spacing:.06em}
    .modal-body{flex:1;overflow-y:auto;padding:16px 20px}
    .modal-desc{font-size:.88rem;color:#cdc9b8;line-height:1.5;margin-bottom:16px;
      padding:10px 13px;background:var(--panel2);border-radius:9px;
      border-left:3px solid var(--gold)}
    .hint{font-size:.74rem;color:var(--gold2);margin-bottom:6px;font-style:italic;
      letter-spacing:.04em}
    .opt-sec{margin-bottom:18px}
    .opt-lbl{font-size:.72rem;font-weight:800;color:var(--gold2);text-transform:uppercase;
      letter-spacing:.18em;margin-bottom:9px}
    .chips{display:flex;flex-wrap:wrap;gap:7px}
    .chip{background:var(--panel2);border:1.5px solid var(--border);border-radius:22px;
      padding:9px 16px;font-size:.86rem;font-weight:600;cursor:pointer;color:var(--text);
      transition:.12s}
    .chip:hover{border-color:var(--border2)}
    .chip.sel{background:linear-gradient(180deg,var(--navy3),var(--navy2));
      color:#fff;border-color:var(--navy3);
      box-shadow:0 2px 8px rgba(29,77,158,.4)}
    .chip.no{background:linear-gradient(180deg,#e85a45,#b8351f);
      color:#fff;border-color:#8e2613;font-weight:700;
      box-shadow:0 2px 8px rgba(184,53,31,.45);
      text-decoration:line-through;text-decoration-thickness:1.5px;text-decoration-color:rgba(255,255,255,.6)}
    .chip.no::before{content:"✕  ";font-weight:900;text-decoration:none;display:inline-block;
      margin-right:2px;text-decoration:none}
    .chip.upsell{background:#352d1a;border-color:#5a4d2a;color:#e8cc88}
    .chip.upsell.sel{background:linear-gradient(180deg,var(--gold2),var(--gold));
      color:#1a1408;border-color:var(--golddark)}
    .chip.note-chip{background:var(--panel3);border-color:var(--border);font-size:.8rem;padding:7px 13px}
    .chip.note-chip:active{background:var(--gold);color:#111}
    .chip.note-chip.sel{background:linear-gradient(180deg,var(--gold2),var(--gold));
      color:#1a1408;border-color:var(--golddark);font-weight:700}
    .chip:active{transform:scale(.95)}
    .notes-ta{width:100%;background:var(--panel2);border:1px solid var(--border);
      border-radius:10px;padding:11px 13px;font-size:.92rem;resize:none;height:72px;color:var(--text)}
    .notes-ta:focus{outline:none;border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(212,179,90,.15)}
    .seat-row{display:flex;gap:6px;flex-wrap:wrap}
    .seat-chip{background:var(--panel2);border:2px solid var(--border);border-radius:10px;
      padding:9px 17px;font-size:.9rem;font-weight:700;cursor:pointer;color:var(--text);min-width:48px;text-align:center}
    .seat-chip.sel{background:linear-gradient(180deg,var(--green2),var(--green));
      color:#fff;border-color:var(--gold)}
    .qty-row{display:flex;align-items:center;gap:14px}
    .modal-qty{font-weight:900;font-size:1.3rem;min-width:34px;text-align:center;
      color:var(--gold2);font-family:var(--serif)}
    .qty-btn-lg{width:42px;height:42px;font-size:1.35rem;border-radius:10px}
    .modal-foot{padding:14px 20px;border-top:1px solid var(--border);
      display:flex;gap:11px;flex-shrink:0;
      background:linear-gradient(180deg,var(--panel),#0d120c)}
    .cancel-btn{flex:1;background:var(--panel2);color:var(--text);border:1px solid var(--border);
      border-radius:11px;padding:14px;font-size:.95rem;font-weight:600;cursor:pointer;
      letter-spacing:.04em}
    .add-btn{flex:2;background:linear-gradient(180deg,var(--green2),var(--green));
      color:#fff;border:none;border-radius:11px;
      padding:14px;font-size:1rem;font-weight:800;cursor:pointer;letter-spacing:.06em;
      box-shadow:0 3px 12px rgba(45,106,45,.4),inset 0 1px 0 rgba(255,255,255,.15)}
    .add-btn:active{opacity:.9;transform:translateY(1px)}

    /* ── BOTTOM SHEET (mobile) ── */
    .sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;display:none;
      backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
    .sheet-ov.vis{display:block}
    .sheet{position:fixed;bottom:0;left:0;right:0;z-index:151;
      background:linear-gradient(180deg,var(--panel) 0%,var(--bg2) 100%);
      border-radius:20px 20px 0 0;max-height:88dvh;display:flex;flex-direction:column;
      box-shadow:0 -6px 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(212,179,90,.3);
      transform:translateY(100%);transition:transform .25s ease}
    .sheet.vis{transform:translateY(0)}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(140%);
      background:linear-gradient(180deg,var(--green2),var(--green));color:#fff;
      padding:13px 26px;border-radius:26px;
      font-weight:700;font-size:.9rem;z-index:300;transition:transform .25s;
      box-shadow:0 6px 24px rgba(0,0,0,.5),0 0 0 1px rgba(212,179,90,.3),inset 0 1px 0 rgba(255,255,255,.15);
      letter-spacing:.04em}
    .toast.vis{transform:translateX(-50%) translateY(0)}

    /* ── SCROLLBARS ── */
    .items-wrap::-webkit-scrollbar,.ord-items::-webkit-scrollbar,.modal-body::-webkit-scrollbar{width:8px}
    .items-wrap::-webkit-scrollbar-thumb,.ord-items::-webkit-scrollbar-thumb,.modal-body::-webkit-scrollbar-thumb{
      background:var(--border2);border-radius:4px}
    .items-wrap::-webkit-scrollbar-track,.ord-items::-webkit-scrollbar-track,.modal-body::-webkit-scrollbar-track{background:transparent}

    /* ── RESPONSIVE ── */
    @media(min-width:880px){
      .order-sidebar{display:flex}
      #viewOrderBtn{display:none!important}
    }
    @media(max-width:879px){
      .order-sidebar{display:none}
      #viewOrderBtn{display:flex!important}
    }
    @media(max-width:520px){
      .logo{font-size:1rem;letter-spacing:.06em}
      .tagline{display:none}
      .logo-img{width:36px;height:36px}
      .hdr-inp{width:64px;padding:7px 6px;font-size:.78rem}
      .beg-toggle{padding:6px 9px;font-size:.7rem}
      .beg-toggle .lbl{display:none}
      .items-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
    }

    @keyframes flash{0%{transform:scale(1)}50%{transform:scale(1.18);background:var(--gold);color:#1a1408}100%{transform:scale(1)}}
    .flashing{animation:flash .35s ease}
  </style>
</head>

// Resolve any "ref" placeholders in Popular sections to actual items
function resolveRefs(){
  for(const sec of Object.keys(MENU)){
    for(const cat of Object.keys(MENU[sec])){
      MENU[sec][cat] = MENU[sec][cat].map(it=>{
        if(it.ref){
          const [s,c,n] = it.ref;
          const found = MENU[s][c]?.find(x=>x.n===n);
          if(found) return {...found, _origCat:c};
        }
        return it;
      });
    }
  }
}
resolveRefs();

function buildSearchIndex(){
  const idx = [];
  for(const sec of Object.keys(MENU)){
    for(const cat of Object.keys(MENU[sec])){
      if(cat.startsWith('Popular')) continue; // skip duplicates
      MENU[sec][cat].forEach((item,i)=>{
        const haystack = [item.n,item.d||'',cat,sec,...(item.tags||[]),...(item.aliases||[])]
          .join(' ').toLowerCase();
        idx.push({sec,cat,i,item,haystack});
      });
    }
  }
  return idx;
}
let SEARCH_IDX = [];

function onSearch(){
  searchQ = document.getElementById('searchInp').value.trim().toLowerCase();
  document.getElementById('searchClear').classList.toggle('vis', !!searchQ);
  renderItems();
}
function clearSearch(){
  document.getElementById('searchInp').value='';
  searchQ='';
  document.getElementById('searchClear').classList.remove('vis');
  renderItems();
}

function searchResults(q){
  const terms = q.split(/\s+/).filter(Boolean);
  return SEARCH_IDX.filter(e=>terms.every(t=>e.haystack.includes(t)));
}

function setSection(s){
  section = s;
  document.getElementById('tab-food').classList.toggle('active', s==='food');
  document.getElementById('tab-drinks').classList.toggle('active', s==='drinks');
  const cats = Object.keys(MENU[s]);
  category = cats[0];
  renderCats(cats);
  const cb = document.getElementById('catBar');
  if(cb) cb.scrollLeft = 0;
  renderItems();
}

function renderCats(cats){
  // Add Favorites as virtual cat at front
  const virtual = [];
  if(favorites.length) virtual.push('★ Favorites');
  const all = [...virtual,...cats];
  document.getElementById('catBar').innerHTML = all.map(c=>
    `<button class="cat-btn${c===category?' active':''}" onclick="setCat('${c.replace(/'/g,"\\'")}')">${c}</button>`
  ).join('');
}

function setCat(c){
  category = c;
  renderCats(Object.keys(MENU[section]));
  renderItems();
}

function favKey(sec,name){return sec+'::'+name;}
function recKey(sec,cat,name){return sec+'::'+cat+'::'+name;}

function getItemsForView(){
  // Search overrides everything
  if(searchQ){
    const r = searchResults(searchQ);
    return {grouped:false, list: r.map(e=>({sec:e.sec,cat:e.cat,i:e.i,item:e.item}))};
  }
  // Favorites
  if(category==='★ Favorites'){
    const list=[];
    favorites.forEach(k=>{
      const [sec,name] = k.split('::');
      for(const cat of Object.keys(MENU[sec]||{})){
        if(cat.startsWith('Popular')) continue;
        const idx = MENU[sec][cat].findIndex(x=>x.n===name);
        if(idx>=0){list.push({sec,cat,i:idx,item:MENU[sec][cat][idx]});break;}
      }
    });
    return {grouped:false,list};
  }
  // Recents
  if(category==='🕒 Recent'){
    const list=[];
    recents.slice(0,20).forEach(k=>{
      const [sec,cat,name] = k.split('::');
      const idx = MENU[sec]?.[cat]?.findIndex(x=>x.n===name);
      if(idx>=0&&idx!=null) list.push({sec,cat,i:idx,item:MENU[sec][cat][idx]});
    });
    return {grouped:false,list};
  }
  // Normal category
  const items = MENU[section][category]||[];
  return {grouped:false,list:items.map((item,i)=>({sec:section,cat:category,i,item}))};
}

function renderItems(){
  const grid = document.getElementById('itemsGrid');
  grid.classList.toggle('compact', !beginner);
  const view = getItemsForView();
  if(!view.list.length){
    grid.innerHTML = `<div class="empty-search">
      ${searchQ?`No matches for "<b>${escapeHtml(searchQ)}</b>"`:'Nothing here yet.'}
    </div>`;
    return;
  }
  grid.innerHTML = view.list.map(({sec,cat,i,item})=>{
    const fk = favKey(sec,item.n);
    const isFav = favorites.includes(fk);
    return `<button class="item-btn${item.custom?' custom-item':''}"
      onclick="openModal('${sec}','${cat.replace(/'/g,"\\'")}',${i})">
      <span class="star${isFav?' on':''}" onclick="event.stopPropagation();toggleFav('${sec}','${item.n.replace(/'/g,"\\'")}')">${isFav?'★':'☆'}</span>
      <div class="iname">${escapeHtml(item.n)}</div>
      ${beginner&&item.d?`<div class="idesc">${escapeHtml(item.d.length>70?item.d.slice(0,68)+'…':item.d)}</div>`:''}
      ${beginner?`<div class="icat">${escapeHtml(item._origCat||cat)}</div>`:''}
    </button>`;
  }).join('');
}

function toggleFav(sec,name){
  const k = favKey(sec,name);
  const i = favorites.indexOf(k);
  if(i>=0) favorites.splice(i,1); else favorites.push(k);
  save();
  renderCats(Object.keys(MENU[section]));
  renderItems();
}

  const k = recKey(sec,cat,name);
  recents = [k,...recents.filter(r=>r!==k)].slice(0,20);

function openModal(sec, cat, idx){
  const baseCat = cat.startsWith('Popular')||cat==='★ Favorites'||cat==='🕒 Recent'
    ? (MENU[sec][cat][idx]._origCat || cat) : cat;
  curItem = {...MENU[sec][cat][idx]};
  curCtx = {sec, cat:baseCat, name:curItem.n};
  sel = {};
  modLimits = {};
  mQty = 1;
  mSeat = '';
  savedNote = '';

  document.getElementById('mTitle').textContent = curItem.n;
  document.getElementById('mSub').textContent = `${baseCat}${curItem._origCat&&curItem._origCat!==baseCat?' · '+curItem._origCat:''}`;

  let html = '';

  if(beginner && curItem.d) html += `<div class="modal-desc">${escapeHtml(curItem.d)}</div>`;
  if(beginner && curItem.pair) html += `<div class="hint">💡 Often ordered with: ${escapeHtml(curItem.pair)}</div>`;

  // Size
  if(curItem.sizes){
    sel['__size'] = curItem.sizes[0];
    html += optSection('Size',
      curItem.sizes.map((s,i)=>chipHtml(s.l, i===0, `pickSize(${i},this)`)).join(''),
      '__size');
  }

  // Side picker for entrees
  if(curItem.sides){
    sel['Side'] = 'Fries';
    html += optSection('Side <span style="color:var(--muted);font-weight:400">(included)</span>',
      SIDE_MOD.o.map((o,i)=>{
        const isUp = o.includes('+$');
        return `<div class="chip${i===0?' sel':''}${isUp?' upsell':''}"
          onclick="pickChip('Side',${JSON.stringify(o).replace(/"/g,'&quot;')},this,false)">${escapeHtml(o)}</div>`;
      }).join(''),'Side');
  }

  // Custom mods
  if(curItem.mods){
    curItem.mods.forEach(mod=>{
      const key = mod.l;
      if(!mod.m){ sel[key] = mod.o[0]; }
      else { sel[key] = []; }
      modLimits[key] = currentLimit(mod);
      html += renderModSection(mod);
    });
  }

  // Quick note chips
  const isDrink = sec==='drinks';
  const quickNotes = isDrink ? QUICK_NOTES_DRINK : QUICK_NOTES_FOOD;
  html += `<div class="opt-sec">
    <div class="opt-lbl">Quick Notes <span style="color:var(--muted);font-weight:400">(tap to toggle)</span></div>
    <div class="chips">
      ${quickNotes.map(q=>`<div class="chip note-chip" onclick="toggleQuickNote(${JSON.stringify(q).replace(/"/g,'&quot;')},this)">${escapeHtml(q)}</div>`).join('')}
    </div>
  </div>`;

  // Notes textarea
  html += `<div class="opt-sec">
    <div class="opt-lbl">Notes / Custom Mods</div>
    <textarea class="notes-ta" id="mNotes" placeholder="Anything else… allergies, temp, special requests"></textarea>
  </div>`;

  // Quantity
  html += `<div class="opt-sec">
    <div class="opt-lbl">Quantity</div>
    <div class="qty-row">
      <button class="qty-btn qty-btn-lg" onclick="chgQty(-1)">−</button>
      <span class="modal-qty" id="mQtyDisp">1</span>
      <button class="qty-btn qty-btn-lg" onclick="chgQty(1)">+</button>
    </div>
  </div>`;

}

function optSection(lbl, inner, idSuffix){
  return `<div class="opt-sec" id="sec_${idSuffix}">
    <div class="opt-lbl">${lbl}</div>
    <div class="chips" id="c_${idSuffix}">${inner}</div>
  </div>`;
}

function modKeyId(key){return key.replace(/[^a-zA-Z0-9]/g,'_');}

function currentLimit(mod){
  if(!mod.m) return null;
  if(mod.maxBySize && sel['__size']) return mod.maxBySize[sel['__size'].l] ?? mod.max ?? null;
  return mod.max ?? null;
}

function groupTotal(group){
  let n = 0;
  (curItem.mods||[]).forEach(m=>{
    if(m.group===group){
      const v = sel[m.l];
      if(Array.isArray(v)) n += v.length;
    }
  });
  return n;
}

function renderModSection(mod){
  const key = mod.l;
  const limit = currentLimit(mod);
  const limitTxt = mod.m
    ? (limit ? ` <span style="color:var(--gold);font-weight:700">(pick up to ${limit}${mod.group?' total':''})</span>`
             : ' <span style="color:var(--muted);font-weight:400">(multi)</span>')
    : '';
  const lbl = `${escapeHtml(key)}${mod.req?' <span style="color:var(--red)">*</span>':''}${limitTxt}`;
  const selVals = Array.isArray(sel[key]) ? sel[key] : [sel[key]];
  const inner = mod.o.map((o,i)=>{
    let cls = '';
    if(mod.m){
      if(selVals.includes('NO:'+o)) cls = ' no';
      else if(selVals.includes(o)) cls = ' sel';
    } else {
      if(sel[key]===o) cls = ' sel';
    }
    return `<div class="chip${cls}"
      onclick="pickChip(${JSON.stringify(key).replace(/"/g,'&quot;')},${JSON.stringify(o).replace(/"/g,'&quot;')},this,${mod.m})">${escapeHtml(o)}</div>`;
  }).join('');
  return optSection(lbl, inner, modKeyId(key));
}

function chipHtml(text, sel, onclick){
  return `<div class="chip${sel?' sel':''}" onclick="${onclick}">${escapeHtml(text)}</div>`;
}

function pickSize(i, el){
  sel['__size'] = curItem.sizes[i];
  el.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  // Re-render any mods whose limit depends on size
  if(curItem.mods){
    // First trim grouped mods so combined total <= new limit
    const groupsTrimmed = new Set();
    curItem.mods.forEach(mod=>{
      if(!mod.maxBySize || !mod.group || groupsTrimmed.has(mod.group)) return;
      const newLimit = currentLimit(mod);
      if(!newLimit) return;
      let total = groupTotal(mod.group);
      if(total > newLimit){
        // Trim from the end of each grouped mod's selection until under cap
        const grouped = curItem.mods.filter(m=>m.group===mod.group);
        for(let i=grouped.length-1; i>=0 && total>newLimit; i--){
          const k = grouped[i].l;
          if(Array.isArray(sel[k])){
            while(sel[k].length && total>newLimit){ sel[k].pop(); total--; }
          }
        }
        toast(`Trimmed sauces/rubs (max ${newLimit} total)`);
      }
      groupsTrimmed.add(mod.group);
    });
    curItem.mods.forEach(mod=>{
      if(!mod.maxBySize) return;
      const newLimit = currentLimit(mod);
      modLimits[mod.l] = newLimit;
      // Trim selections if over new limit (non-grouped)
      if(!mod.group && newLimit && Array.isArray(sel[mod.l]) && sel[mod.l].length > newLimit){
        const dropped = sel[mod.l].length - newLimit;
        sel[mod.l] = sel[mod.l].slice(0, newLimit);
        toast(`Trimmed ${dropped} ${mod.l.toLowerCase()} (max ${newLimit})`);
      }
      const sec = document.getElementById('sec_'+modKeyId(mod.l));
      if(sec) sec.outerHTML = renderModSection(mod);
    });
  }
}

function pickChip(key, val, el, multi){
  if(multi){
    // 3-state cycle: off → sel (wants) → no (excluded ✕) → off
    if(!Array.isArray(sel[key])) sel[key]=[];
    const isSel = el.classList.contains('sel');
    const isNo  = el.classList.contains('no');
    if(isSel){
      // selected → excluded
      el.classList.remove('sel');
      el.classList.add('no');
      sel[key]=sel[key].filter(v=>v!==val);
      sel[key].push('NO:'+val);
    } else if(isNo){
      // excluded → off
      el.classList.remove('no');
      sel[key]=sel[key].filter(v=>v!=='NO:'+val);
    } else {
      // off → selected (respect cap; excluded items don’t count toward cap)
      const limit = modLimits[key];
      const mod = (curItem.mods||[]).find(m=>m.l===key);
      const positiveCount = sel[key].filter(v=>!String(v).startsWith('NO:')).length;
      if(mod && mod.group){
        if(limit && groupTotal(mod.group) >= limit){
          toast(`Max ${limit} sauces/rubs total`);
          return;
        }
      } else if(limit && positiveCount >= limit){
        toast(`Max ${limit} ${key.toLowerCase()}`);
        return;
      }
      el.classList.add('sel');
      sel[key].push(val);
    }
  } else {
    el.parentElement.querySelectorAll('.chip').forEach(x=>x.classList.remove('sel'));
    el.classList.add('sel');
    sel[key]=val;
  }
}

function pickSeat(n, el){
  mSeat = (mSeat == n) ? '' : String(n);
  document.querySelectorAll('.seat-chip').forEach(c=>c.classList.remove('sel'));
  if(mSeat) el.classList.add('sel');
}

function chgQty(d){ mQty=Math.max(1,mQty+d); document.getElementById('mQtyDisp').textContent=mQty; }

function toggleQuickNote(txt, el){
  const ta = document.getElementById('mNotes');
  if(!ta) return;
  // Split current notes into parts (comma-separated), case-insensitive match
  const parts = ta.value.split(',').map(p=>p.trim()).filter(Boolean);
  const lower = txt.toLowerCase();
  const idx = parts.findIndex(p=>p.toLowerCase()===lower);
  if(idx>=0){
    parts.splice(idx,1);
    el.classList.remove('sel');
  } else {
    parts.push(txt);
    el.classList.add('sel');
  }
  ta.value = parts.join(', ');
}

function addToOrder(){
  const notes = (document.getElementById('mNotes')?.value||'').trim();

  // Build mods string
  const parts=[];
  for(const[k,v] of Object.entries(sel)){
    if(k==='__size'){ parts.push(`Size: ${v.l}`); continue; }
    if(Array.isArray(v)){
      if(!v.length) continue;
      const yes = v.filter(x=>!String(x).startsWith('NO:'));
      const no  = v.filter(x=> String(x).startsWith('NO:')).map(x=>x.slice(3));
      const segs = [];
      if(yes.length) segs.push(yes.join(', '));
      if(no.length)  segs.push('NO ' + no.join(', NO '));
      if(segs.length) parts.push(`${k}: ${segs.join(' | ')}`);
    }
    else if(v) parts.push(`${k}: ${v}`);
  }

  let price = curItem.p || 0;
  if(sel['__size']) price = sel['__size'].p;

  order.push({
    id: Date.now()+Math.random(),
    name: curItem.n,
    price,
    qty: mQty,
    seat: mSeat,
    mods: parts.join(' | '),
    notes,
  });

  if(curCtx) pushRecent(curCtx.sec, curCtx.cat, curCtx.name);
  save();
  closeModal();
  renderOrder();
  flashBadge();
  toast(`Added ${mQty>1?mQty+'× ':''}${curItem.n}`);
}

function closeModal(){
  document.getElementById('modalOv').classList.add('hidden');
  curItem=null; curCtx=null; sel={}; mQty=1; mSeat='';
}

// ══════════════════════════════════════════════════════════════
// SCRATCHPAD ORDER RENDERING
// ══════════════════════════════════════════════════════════════
function orderHTML(){
  if(!order.length) return `<div class="empty-ord">
    <div class="empty-ord-ico">📝</div>
    Scratchpad is empty.<br>Tap any item to add it here as you take the order.
  </div>`;
  return order.map((item,idx)=>{
    // Parse mods into yes/no groups per key
    const modRows = [];
    if(item.mods){
      item.mods.split(' | ').forEach(seg=>{
        if(!seg.trim()) return;
        const colon = seg.indexOf(':');
        if(colon>0){
          const key = seg.slice(0,colon).trim();
          const vals = seg.slice(colon+1).trim();
          // Split on ' | NO ' pattern within the value to separate yes/no
          // vals might be like "Ranch, BBQ | NO Onion, NO Tomato"
          const noParts = [];
          const yesParts = [];
          vals.split(', ').forEach(v=>{
            if(v.startsWith('NO ')) noParts.push(v.slice(3));
            else yesParts.push(v);
          });
          if(yesParts.length) modRows.push({key, vals:yesParts.join(', '), isNo:false});
          if(noParts.length)  modRows.push({key, vals:noParts.join(', '), isNo:true});
        } else if(seg.startsWith('NO ')){
          modRows.push({key:'NO', vals:seg.slice(3), isNo:true});
        } else {
          modRows.push({key:'', vals:seg, isNo:false});
        }
      });
    }
    const yesRows = modRows.filter(r=>!r.isNo);
    const noRows  = modRows.filter(r=> r.isNo);
    return `
    <div class="ord-item" id="oi_${item.id}">
      <div class="oi-num">#${idx+1}</div>
      <div class="oi-head">
        <div>
          <div class="oi-name">${escapeHtml(item.name)}</div>
          ${item.seat?`<div class="oi-seat">SEAT ${escapeHtml(item.seat)}</div>`:''}
        </div>
        ${item.qty>1?`<div class="oi-qty-badge">${item.qty}×</div>`:''}
      </div>
      ${(yesRows.length||noRows.length)?`<div class="oi-mods">
        ${yesRows.map(r=>`<div class="oi-mod-row">
          ${r.key?`<span class="oi-mod-label">${escapeHtml(r.key)}</span>`:''}
          <span class="oi-mod-val">${escapeHtml(r.vals)}</span>
        </div>`).join('')}
        ${noRows.length?`<div class="oi-no-row">
          <span class="oi-no-label">NO</span>
          ${noRows.map(r=>r.vals.split(', ').map(v=>`<span class="oi-no-pill">${escapeHtml(v)}</span>`).join('')).join('')}
        </div>`:''}
      </div>`:''}
      ${item.notes?`<div class="oi-notes">${escapeHtml(item.notes)}</div>`:''}
      <div class="oi-ctrl">
        ${item.price?`<span class="oi-price">$${Number(item.price).toFixed(2)}</span>`:''}
        <button class="qty-btn" onclick="chgItemQty('${item.id}',-1)">−</button>
        <span class="qty-disp">${item.qty}</span>
        <button class="qty-btn" onclick="chgItemQty('${item.id}',1)">+</button>
        <button class="rm-btn" onclick="rmItem('${item.id}')" title="Remove">✕</button>
      </div>
    </div>`;
  }).join('');
}

function footerHTML(noteId){
  const count = order.reduce((s,i)=>s+i.qty,0);
  const total = order.reduce((s,i)=>s+(i.price||0)*i.qty,0);
  return `
    <div class="ord-foot">
      <div class="ord-meta">
        <span><span class="count">${count}</span> item${count===1?'':'s'}</span>
        ${total?`<span class="total">~$${total.toFixed(2)}</span>`:''}
      </div>
      <button class="clear-big" onclick="clearOrder()">🗑 CLEAR ORDER</button>
    </div>`;
}

function renderOrder(){
  const headHtml = `<div class="ord-head">
      <h2>📝 Scratchpad Order${getTableLabel()}</h2>
    </div>`;
  document.getElementById('sidebar').innerHTML = headHtml +
    `<div class="ord-items">${orderHTML()}</div>` + footerHTML('noteSidebar');
  document.getElementById('sheetInner').innerHTML = headHtml +
    `<div class="ord-items">${orderHTML()}</div>` + footerHTML('noteSheet');
  updateBadge();
}

function getTableLabel(){
  return '';
}

function chgItemQty(id,d){
  const it=order.find(i=>i.id==id);
  if(!it)return;
  it.qty=Math.max(1,it.qty+d);
  save(); renderOrder();
}

function rmItem(id){
  order=order.filter(i=>i.id!=id);
  save(); renderOrder();
}

function clearOrder(){
  if(!order.length){toast('Nothing to clear');return;}
  if(confirm('Clear this scratchpad order? Make sure you entered it into the real POS first.')){
    order=[]; save(); renderOrder(); closeSheet();
    toast('Scratchpad cleared');
  }
}

function updateBadge(){
  const n=order.reduce((s,i)=>s+i.qty,0);
  document.getElementById('badge').textContent=n;
}

function flashBadge(){
  const b=document.getElementById('badge');
  b.classList.remove('flashing'); void b.offsetWidth; b.classList.add('flashing');
  setTimeout(()=>b.classList.remove('flashing'),400);
}

// ══════════════════════════════════════════════════════════════
// COPY ORDER TEXT
// ══════════════════════════════════════════════════════════════
function buildOrderText(noteId){
  const server = document.getElementById('serverName').value.trim();
  const ordNote = document.getElementById(noteId)?.value?.trim() || '';
  const lines = [];
  if(server) lines.push(`Server: ${server}`);
  if(lines.length) lines.push('');

  // Group by seat
  const bySeat = {};
  order.forEach(it=>{ const k=it.seat||'—'; (bySeat[k]=bySeat[k]||[]).push(it); });
  const seatKeys = Object.keys(bySeat).sort((a,b)=>{
    if(a==='—') return 1; if(b==='—') return -1; return Number(a)-Number(b);
  });

  seatKeys.forEach(seat=>{
    if(seat!=='—') lines.push(`— Seat ${seat} —`);
    bySeat[seat].forEach(it=>{
      lines.push(`${it.qty}x ${it.name}`);
      if(it.mods){
        it.mods.split(' | ').forEach(m=>lines.push(`  • ${m}`));
      }
      if(it.notes) lines.push(`  • Note: ${it.notes}`);
    });
    lines.push('');
  });

  if(ordNote){ lines.push('---'); lines.push('Order Note: '+ordNote); }
  return lines.join('\n').trim();
}

function copyOrderText(noteId){
  if(!order.length){toast('Scratchpad is empty');return;}
  const text = buildOrderText(noteId);
  const btn = document.getElementById('copyBtn_'+noteId);
  const done = ()=>{
    if(btn){btn.textContent='✓ Copied!';btn.classList.add('copied');
      setTimeout(()=>{btn.textContent='📋 Copy Order Text';btn.classList.remove('copied');},1600);}
    toast('Order text copied');
  };
  if(navigator.clipboard?.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallbackCopy(text,done));
  } else fallbackCopy(text,done);
}

function fallbackCopy(text,cb){
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{document.execCommand('copy');cb();}catch(e){alert(text);}
  document.body.removeChild(ta);
}
